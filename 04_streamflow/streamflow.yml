version: v1.0
workflows:
  master:
    type: cwl
    config: 
      file: main.cwl
      settings: inputs.yml
    bindings:
      - step: /step1
        target: 
          deployment: local
      - step: /step2_1
        target: 
          deployment: slurm
          service: broadwell
      - step: /step2_2
        target: 
          deployment: slurm
          service: broadwell
      - step: /step2_3
        target: 
          deployment: slurm
          service: broadwell
      - step: /step3
        target: 
          deployment: local

deployments:
  hpc:
    type: ssh
    workdir: <HPC_WORKDIR>
    config:
      username: <HPC_USER>
      nodes:
        - <HPC_HOST>
      sshKey: <SSH_KEY>
      checkHostKey: false

  slurm:
    type: slurm
    workdir: <HPC_WORKDIR>
    wraps: hpc
    config:
      services: 
        broadwell:
          # other slurm parameters can be set here, e.g. time, memory, etc.
          partition: broadwell
    
  local:
    type: local
    config: {}
      
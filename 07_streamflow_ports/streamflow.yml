version: v1.0

# OUTPUT COLLECTION:
# File outputs declared in the CWL workflow are automatically transferred back
# to local by streamflow when the workflow completes — no manual scp needed.
#
# Where outputs land is controlled by --outdir on the CLI:
#   streamflow run streamflow.yml --outdir ./results
#
# Without --outdir, outputs are written to the current directory.
#
# In this example:
#   summary_file  → produced by `inspect` on HPC → fetched back to local → placed in --outdir
#   report        → produced by `process` locally → placed in --outdir

# KEY CONCEPT: streamflow bindings have two kinds of entries:
#
#   step: /name   → WHERE to run the computation (which deployment executes it)
#   port: /name   → WHERE to find an input file/directory (which deployment holds it)
#
# Port bindings are essential when input data already lives on a remote system.
# Instead of uploading from local → HPC, streamflow reads the file directly
# from the remote deployment's workdir.
#
# In this example:
#   - inspect runs on the HPC cluster (broadwell partition)
#   - process runs locally
#   - param_file and data_dir are sourced from the HPC workdir (port bindings below)

workflows:
  master:
    type: cwl
    config:
      file: main.cwl
      settings: inputs.yml
    bindings:
      # Step bindings: where each step runs
      - step: /inspect
        target:
          deployment: hpc-slurm
          service: broadwell

      - step: /process
        target:
          deployment: local

      # Port bindings: where each File/Directory input is sourced from.
      # streamflow transfers the file FROM this deployment into the step's workdir.
      # workdir is the directory on the remote where the file path in inputs.yml is resolved.
      - port: /param_file
        target:
          deployment: hpc-ssh
          workdir: <PORT_WORKDIR>

      - port: /data_dir
        target:
          deployment: hpc-ssh
          workdir: <PORT_WORKDIR>

deployments:
  local:
    type: local
    config: {}

  hpc-ssh:
    type: ssh
    config:
      nodes:
        - <HPC_HOST>
      username: <HPC_USER>
      sshKey: <SSH_KEY>
      checkHostKey: false
    workdir: <HPC_WORKDIR>

  hpc-slurm:
    type: slurm
    wraps: hpc-ssh
    config:
      services:
        broadwell:
          partition: broadwell
          # time: "01:00:00"
          # mem: "8G"

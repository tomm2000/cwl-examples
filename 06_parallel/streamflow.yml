version: v1.0
workflows:
  master:
    type: cwl
    config:
      file: main.cwl
      settings: inputs.yml
    bindings:
      - step: /step1
        target:
          deployment: local

      # One binding covers ALL scatter instances of step2.
      # If elements has 10 items, streamflow dispatches 10 jobs to Slurm concurrently.
      - step: /step2
        target:
          deployment: slurm
          service: broadwell

      - step: /step3
        target:
          deployment: local

deployments:
  local:
    type: local
    config: {}

  hpc:
    type: ssh
    workdir: <HPC_WORKDIR>
    config:
      username: <HPC_USER>
      nodes:
        - <HPC_HOST>
      sshKey: <SSH_KEY>
      checkHostKey: false

  slurm:
    type: slurm
    workdir: <HPC_WORKDIR>
    wraps: hpc
    config:
      maxConcurrentJobs: 10
      services:
        broadwell:
          partition: broadwell
